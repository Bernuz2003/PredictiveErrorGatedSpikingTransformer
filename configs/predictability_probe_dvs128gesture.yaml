seed: 2021
device: cuda
timesteps: 16
model:
  img_size_h: 128
  img_size_w: 128
  in_channels: 2
  num_classes: 11
  embed_dims: 128
  mlp_ratio: 4.0
  num_heads: 16
  T: 16
dataset:
  name: dvs128gesture
  root: /path/to/DVS128Gesture
  T: 16
  split_by: number
  batch_size: 8
  workers: 4
predictive:
  enabled: false
  stage: stage1
  stages: [stage1]
  history: 2
  predictor_type: depthwise_conv
  loss_type: l1
  loss_weight: 0.0
  loss_reduction: mean
  stage_loss_weights:
    stage1: 1.0
  target: latent
modulation:
  enabled: false
  stage: stage1
  stages: [stage1]
  mode: membrane_gain
  alpha: 0.1
early_exit:
  enabled: false
  confidence_thresholds: [0.7, 0.8, 0.9, 0.95]
  prediction_error_thresholds: []
profiling:
  enabled: true
  save_logits_over_time: false
  save_stage_activity: true
  save_layer_activity: true
  save_membrane_samples: false
  profile_batches: 1

seed: 2021
device: cuda
timesteps: 8
model:
  img_size_h: 128
  img_size_w: 128
  in_channels: 2
  num_classes: 11
  embed_dims: 128
  mlp_ratio: 4.0
  num_heads: 16
  T: 8
dataset:
  name: dvs128gesture
  root: /path/to/DVS128Gesture
  T: 8
  split_by: number
  batch_size: 16
  workers: 4
  pin_memory: true
  drop_last_train: true
predictive:
  enabled: true
  stage: stage2
  stages: [stage2]
  history: 2
  predictor_type: depthwise_conv
  loss_type: smooth_l1
  loss_weight: 0.05
  warmup_epochs: 20
  ramp_epochs: 20
  normalize_loss: true
  amplitude_loss_weight: 0.05
  loss_reduction: mean
  stage_loss_weights:
    stage2: 1.0
  target: latent
  stop_gradient_target: true
modulation:
  enabled: true
  stage: stage2
  stages: [stage2]
  mode: membrane_gain
  alpha: 0.1
early_exit:
  enabled: false
  confidence_thresholds: [0.7, 0.8, 0.9, 0.95]
  prediction_error_thresholds: []
profiling:
  enabled: true
  save_logits_over_time: true
  max_logits_batches: 8
  save_stage_activity: true
  save_layer_activity: true
  save_membrane_samples: false
  profile_batches: 0
scheduler:
  type: cosine
  warmup_epochs: 10
  warmup_lr: 0.00001
  min_lr: 0.00002
augmentation:
  random_horizontal_flip: true
  horizontal_flip_prob: 0.5
  snn_augment_wide: true
  mixup: 0.5
  mixup_prob: 0.5
  mixup_off_epoch: 75
loss:
  train: soft_target_cross_entropy
  eval: cross_entropy
training:
  epochs: 90
  amp: true
  label_smoothing: 0.1
  spike_l1_weight: 0.0
  T_train: null
  grad_ratio_every: 20
optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.06

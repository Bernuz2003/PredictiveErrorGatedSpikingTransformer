seed: 2021
device: cuda
timesteps: 8
model:
  img_size_h: 128
  img_size_w: 128
  in_channels: 2
  num_classes: 11
  embed_dims: 128
  mlp_ratio: 4.0
  num_heads: 16
  T: 8
dataset:
  name: dvs128gesture
  root: /path/to/DVS128Gesture
  T: 8
  split_by: number
  batch_size: 16
  workers: 4
  pin_memory: true
  drop_last_train: true
record_internal_states: false
record_targets: [input_current, pre_membrane, post_reset_membrane, spike, threshold_margin, soft_firing_prob]
early_exit:
  enabled: false
  confidence_thresholds: [0.7, 0.8, 0.9, 0.95]
profiling:
  enabled: true
  save_logits_over_time: false
  save_stage_activity: true
  save_layer_activity: true
  profile_batches: 1
scheduler:
  type: cosine
  warmup_epochs: 10
  warmup_lr: 0.00001
  min_lr: 0.00002
augmentation:
  random_horizontal_flip: true
  horizontal_flip_prob: 0.5
  snn_augment_wide: true
  mixup: 0.5
  mixup_prob: 0.5
  mixup_off_epoch: 75
loss:
  train: soft_target_cross_entropy
  eval: cross_entropy
training:
  epochs: 90
  amp: true
  label_smoothing: 0.1
  spike_l1_weight: 0.0
  T_train: null
optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.06

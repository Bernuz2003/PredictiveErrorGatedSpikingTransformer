seed: 2021
device: cuda
timesteps: 8
model:
  img_size_h: 128
  img_size_w: 128
  in_channels: 2
  num_classes: 11
  embed_dims: 128
  mlp_ratio: 4.0
  num_heads: 16
  T: 8
dataset:
  name: dvs128gesture
  root: /path/to/DVS128Gesture
  T: 8
  split_by: number
  batch_size: 16
  workers: 4
  pin_memory: true
  drop_last_train: false
record_internal_states: false
record_targets: [input_current, pre_membrane, post_reset_membrane, spike, threshold_margin, soft_firing_prob]
profiling:
  enabled: false
  save_logits_over_time: false
  save_stage_activity: false
  save_layer_activity: false

